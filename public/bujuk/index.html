<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Peace Offering 🐱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8eaf6);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .cat-container {
            margin-bottom: 30px;
        }

        .cat-container img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-size: 1.8rem;
            color: #5c3d6e;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeIn 1s ease forwards 0.3s;
        }

        .subtitle {
            font-size: 1rem;
            color: #7e57a0;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1s ease forwards 0.6s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-kesal {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(238, 90, 36, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s ease forwards 0.9s, pulse 2s ease-in-out infinite 1.5s;
        }

        .btn-kesal:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(238, 90, 36, 0.5);
        }

        .btn-kesal:active {
            transform: scale(0.98);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 25px rgba(238, 90, 36, 0.4); }
            50% { box-shadow: 0 8px 40px rgba(238, 90, 36, 0.7); }
        }

        .message {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.6s ease;
        }

        .message p {
            font-size: 1.1rem;
            color: #4a3560;
            line-height: 1.7;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            display: none;
        }

        .heart {
            position: absolute;
            font-size: 1.5rem;
            animation: fall 3s ease-in forwards;
        }

        @keyframes fall {
            0% {
                opacity: 1;
                transform: translateY(-20px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>

    <div class="container">
        <div class="cat-container">
            <img src="https://cdn.pixabay.com/photo/2024/02/28/07/42/european-shorthair-8601492_640.jpg" alt="Kucing melas" id="catImg">
        </div>

        <h1 class="title">The Peace Offering 🐱</h1>
        <p class="subtitle">Hai sayang... ada sesuatu buat kamu</p>

        <button class="btn-kesal" id="btnKesal" onclick="handleClick()">
            KLIK KALO KAMU LAGI KESAL
        </button>

        <div class="message" id="message">
            <p>Maap ya bei, ga maksud bikin kamu marah/badmood 😿<br><br>
            Ini deh biar km ga cemberut lagi, ak punya sesuatu buat km 💝</p>
        </div>
    </div>

    <audio id="meowSound" preload="auto">
        <source src="https://www.myinstants.com/media/sounds/meow.mp3" type="audio/mpeg">
    </audio>

    <script>
        let clicked = false;

        function handleClick() {
            if (clicked) return;
            clicked = true;

            // Play meow sound
            const meow = document.getElementById('meowSound');
            meow.currentTime = 0;
            meow.play().catch(() => {
                // Fallback: Web Audio API meow
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.3);
                osc.frequency.exponentialRampToValueAtTime(250, ctx.currentTime + 0.6);
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.7);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.7);
            });

            // Hide button
            const btn = document.getElementById('btnKesal');
            btn.style.display = 'none';

            // Show message
            const msg = document.getElementById('message');
            msg.style.display = 'block';

            // Rain hearts
            showHearts();

            // Change cat image to happy cat
            const catImg = document.getElementById('catImg');
            catImg.src = 'https://cdn.pixabay.com/photo/2019/11/08/11/36/kitten-4611189_640.jpg';
        }

        function showHearts() {
            const heartsContainer = document.getElementById('hearts');
            heartsContainer.style.display = 'block';
            const emojis = ['💕', '💖', '💗', '💝', '🩷', '✨'];

            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('span');
                    heart.classList.add('heart');
                    heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (2 + Math.random() * 2) + 's';
                    heartsContainer.appendChild(heart);

                    setTimeout(() => heart.remove(), 4000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
