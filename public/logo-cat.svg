<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cat head -->
  <circle cx="32" cy="36" r="20" fill="#c8a45c"/>
  <!-- Ears -->
  <polygon points="16,20 12,4 26,16" fill="#c8a45c"/>
  <polygon points="48,20 52,4 38,16" fill="#c8a45c"/>
  <!-- Inner ears -->
  <polygon points="17,18 14,8 24,16" fill="#f0d68a"/>
  <polygon points="47,18 50,8 40,16" fill="#f0d68a"/>
  <!-- Face -->
  <circle cx="32" cy="38" r="16" fill="#f0d68a"/>
  <!-- Eyes -->
  <ellipse cx="25" cy="34" rx="3.5" ry="4" fill="#1a1a1a"/>
  <ellipse cx="39" cy="34" rx="3.5" ry="4" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="26.5" cy="32.5" r="1.5" fill="white"/>
  <circle cx="40.5" cy="32.5" r="1.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="2.5" ry="2" fill="#e8836b"/>
  <!-- Mouth -->
  <path d="M29,43 Q32,46 35,43" fill="none" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M32,40 L32,43" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="10" y1="37" x2="22" y2="39" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="10" y1="41" x2="22" y2="41" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="42" y1="39" x2="54" y2="37" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="42" y1="41" x2="54" y2="41" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Blush -->
  <circle cx="22" cy="42" r="3" fill="#f5a0a0" opacity="0.4"/>
  <circle cx="42" cy="42" r="3" fill="#f5a0a0" opacity="0.4"/>
</svg>