<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cat head -->
  <circle cx="32" cy="36" r="20" fill="#c8a45c"/>
  <!-- Ears -->
  <polygon points="16,20 12,4 26,16" fill="#c8a45c"/>
  <polygon points="48,20 52,4 38,16" fill="#c8a45c"/>
  <!-- Inner ears -->
  <polygon points="17,18 14,8 24,16" fill="#f0d68a"/>
  <polygon points="47,18 50,8 40,16" fill="#f0d68a"/>
  <!-- Face -->
  <circle cx="32" cy="38" r="16" fill="#f0d68a"/>
  <!-- Big eyes (belo) -->
  <ellipse cx="24" cy="33" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="40" cy="33" rx="5" ry="5.5" fill="white"/>
  <!-- Pupils (big & cute) -->
  <ellipse cx="24" cy="34" rx="3.5" ry="4" fill="#1a1a1a"/>
  <ellipse cx="40" cy="34" rx="3.5" ry="4" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="26" cy="32" r="2" fill="white"/>
  <circle cx="42" cy="32" r="2" fill="white"/>
  <circle cx="23" cy="35" r="1" fill="white" opacity="0.6"/>
  <circle cx="39" cy="35" r="1" fill="white" opacity="0.6"/>
  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="2.5" ry="2" fill="#e8836b"/>
  <!-- Big smile -->
  <path d="M26,44 Q32,50 38,44" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M32,40 L32,44" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
  <!-- Smile cheek lines -->
  <path d="M24,44 Q22,46 20,45" fill="none" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M40,44 Q42,46 44,45" fill="none" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="8" y1="36" x2="19" y2="38" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="8" y1="40" x2="19" y2="40" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="8" y1="44" x2="19" y2="42" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="45" y1="38" x2="56" y2="36" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="45" y1="40" x2="56" y2="40" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="45" y1="42" x2="56" y2="44" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Blush (bigger for happy expression) -->
  <circle cx="20" cy="42" r="4" fill="#f5a0a0" opacity="0.5"/>
  <circle cx="44" cy="42" r="4" fill="#f5a0a0" opacity="0.5"/>
</svg>
