<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyinyiStore Overlay - Top Right</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .overlay-container {
      position: fixed;
      top: 30px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(18, 18, 18, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(239, 143, 143, 0.3);
      border-radius: 14px;
      padding: 10px 16px 10px 12px;
      animation: slideDown 0.6s ease-out, glow 2.5s ease-in-out infinite;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(239, 143, 143, 0.1);
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
    }

    .text-content {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .store-name {
      font-family: 'Fredoka', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #EF8F8F;
    }

    .website {
      font-family: 'Fredoka', sans-serif;
      font-size: 10px;
      color: #d4af37;
      font-weight: 600;
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(239, 143, 143, 0.1); }
      50% { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 25px rgba(239, 143, 143, 0.25); }
    }
  </style>
</head>
<body>
  <div class="overlay-container">
    <img src="https://nyinyistore.com/logo-cat.png" alt="NyinyiStore" class="logo" />
    <div class="text-content">
      <div class="store-name">NyinyiStore</div>
      <div class="website">nyinyistore.com</div>
    </div>
  </div>
</body>
</html>
