<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyinyiStore Overlay - Mini</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .overlay-container {
      position: fixed;
      top: 30px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: none;
      border-radius: 14px;
      padding: 10px 18px 10px 12px;
      min-height: 58px;
      min-width: 180px;
      animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: none;
      overflow: visible;
    }

    /* Border removed - transparent overlay */
    .overlay-container::before,
    .overlay-container::after {
      display: none;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      animation: bounce 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* Live dot */
    .live-dot {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      border: 2px solid #121212;
      animation: livePulse 1.5s ease-in-out infinite;
      z-index: 2;
    }

    /* Sparkles */
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #d4af37;
      border-radius: 50%;
      opacity: 0;
      animation: sparkle 2.5s ease-in-out infinite;
      z-index: 2;
    }
    .sparkle:nth-child(1) { top: -5px; left: 20%; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: -8px; left: 50%; animation-delay: 0.8s; }
    .sparkle:nth-child(3) { top: -4px; right: 20%; animation-delay: 1.6s; }
    .sparkle:nth-child(4) { bottom: -5px; left: 30%; animation-delay: 0.4s; }
    .sparkle:nth-child(5) { bottom: -7px; right: 30%; animation-delay: 1.2s; }

    /* Content wrapper */
    .content-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .text-area {
      position: relative;
      min-width: 130px;
      height: 38px;
    }

    .scene {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      opacity: 0;
      animation: sceneSwitch 6s ease-in-out infinite;
    }

    .scene-1 { animation-delay: 0s; }
    .scene-2 { animation-delay: 3s; }

    .store-name {
      font-family: 'Fredoka', sans-serif;
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(90deg, #EF8F8F, #f5b8b8, #EF8F8F);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textShine 3s linear infinite;
      white-space: nowrap;
    }

    .tagline {
      font-family: 'Fredoka', sans-serif;
      font-size: 11px;
      color: #d4af37;
      font-weight: 600;
      white-space: nowrap;
    }

    .website {
      font-family: 'Fredoka', sans-serif;
      font-size: 9px;
      color: #888;
      white-space: nowrap;
    }

    @keyframes slideDown {
      from { transform: translateY(-60px) scale(0.8); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.08) rotate(-3deg); }
      50% { transform: scale(1) rotate(0deg); }
      75% { transform: scale(1.05) rotate(3deg); }
    }

    @keyframes borderRotate {
      0% { background-position: 0% 50%; }
      100% { background-position: 400% 50%; }
    }

    @keyframes textShine {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes livePulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 4px #4caf50; }
      50% { transform: scale(1.3); box-shadow: 0 0 10px #4caf50, 0 0 20px rgba(76, 175, 80, 0.3); }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0) translateY(0); }
      50% { opacity: 1; transform: scale(1) translateY(-8px); }
    }

    @keyframes sceneSwitch {
      0%, 3% { opacity: 0; transform: translateY(6px); }
      8%, 42% { opacity: 1; transform: translateY(0); }
      47%, 100% { opacity: 0; transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="overlay-container">
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="live-dot"></div>

    <div class="content-wrapper">
      <img src="https://nyinyistore.com/logo-cat.png" alt="NyinyiStore" class="logo" />
      <div class="text-area">
        <!-- Scene 1: NyinyiStore -->
        <div class="scene scene-1">
          <div class="store-name">NyinyiStore</div>
        </div>
        <!-- Scene 2: Tagline + Website -->
        <div class="scene scene-2">
          <div class="tagline">⚡ Top Up Game Murah</div>
          <div class="website">nyinyistore.com</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
