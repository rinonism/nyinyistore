<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyinyiStore Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .overlay-container {
      position: fixed;
      bottom: 30px;
      left: 30px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(18, 18, 18, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 16px;
      padding: 12px 20px 12px 14px;
      animation: slideIn 0.8s ease-out, float 3s ease-in-out infinite 1s;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 175, 55, 0.1);
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      animation: pulse 2s ease-in-out infinite;
    }

    .text-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .store-name {
      font-family: 'Fredoka', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #EF8F8F;
      text-shadow: 0 0 10px rgba(239, 143, 143, 0.3);
    }

    .tagline {
      font-family: 'Fredoka', sans-serif;
      font-size: 11px;
      color: #d4af37;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .website {
      font-family: 'Fredoka', sans-serif;
      font-size: 10px;
      color: #999;
      margin-top: 1px;
    }

    /* Shimmer effect on border */
    .overlay-container::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      border-radius: 17px;
      background: linear-gradient(45deg, transparent 30%, rgba(212, 175, 55, 0.4) 50%, transparent 70%);
      background-size: 200% 200%;
      animation: shimmer 3s linear infinite;
      z-index: -1;
    }

    /* Glow dot */
    .glow-dot {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 6px;
      height: 6px;
      background: #4caf50;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
      box-shadow: 0 0 6px #4caf50;
    }

    @keyframes slideIn {
      from { transform: translateX(-100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes shimmer {
      0% { background-position: -200% -200%; }
      100% { background-position: 200% 200%; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="overlay-container">
    <div class="glow-dot"></div>
    <img src="https://nyinyistore.com/logo-cat.png" alt="NyinyiStore" class="logo" />
    <div class="text-content">
      <div class="store-name">NyinyiStore</div>
      <div class="tagline">⚡ Top Up Game Termurah</div>
      <div class="website">nyinyistore.com</div>
    </div>
  </div>
</body>
</html>
